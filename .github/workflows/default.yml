---
on: [push]
name: default

jobs:
  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .
  luacheck:
    name: luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lunarmodules/luacheck@v1
        with:
          args: . --std luajit --globals vim --max-line-length 150 --no-config
  lua-language-server:
    name: lua-language-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: nightly
      - run: |
          mkdir -p ~/.local/share/lua-language-server
          LUA_LS_VERSION=$(curl -s https://api.github.com/repos/LuaLS/lua-language-server/releases/latest | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4)
          curl -L "https://github.com/LuaLS/lua-language-server/releases/download/${LUA_LS_VERSION}/lua-language-server-${LUA_LS_VERSION}-linux-x64.tar.gz" \
            | tar xz -C ~/.local/share/lua-language-server
          echo "$HOME/.local/share/lua-language-server/bin" >> "$GITHUB_PATH"
      - run: |
          VIMRUNTIME=$(nvim --clean --headless -c 'echo $VIMRUNTIME' -c 'q' 2>&1) \
            lua-language-server --check lua --configpath "$PWD/.luarc.json" --checklevel=Warning
  deno_fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.12 # Run with latest stable Deno.
      - run: deno fmt --check
  spelling:
    name: Spell Check with Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@v6
      - name: Spell Check Repo
        uses: crate-ci/typos@v1.45.1
